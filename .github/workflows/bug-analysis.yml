name: Bug Analysis

on:
 issues:
  types: [labeled]

jobs:
 analyze-bug:
  # "버그" 또는 "bug" 라벨이 추가될 때만 실행
  if: github.event.label.name == '버그' || github.event.label.name == 'bug'
  runs-on: ubuntu-latest
  permissions:
   contents: read
   pull-requests: read
   issues: write
   id-token: write

  steps:
   - name: Checkout repository
     uses: actions/checkout@v4
     with:
      fetch-depth: 1

   - name: Analyze bug with Claude
     id: claude-analysis
     uses: anthropics/claude-code-action@v1
     with:
      claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      allowed_bots: "claude[bot],github-actions[bot]"
      prompt: |
       ## 분석 대상 이슈
       - 이슈 번호: #${{ github.event.issue.number }}
       - 제목: ${{ github.event.issue.title }}
       - 본문:
       ${{ github.event.issue.body }}

       ## 역할
       당신은 버그를 직접 해결하는 것이 아니라, 작업자가 문제를 빠르게 파악하고 해결할 수 있도록 컨텍스트를 제공하는 조사관입니다.

       ## 원칙
       - 확정적인 결론을 내리지 마세요. "~일 가능성이 있습니다", "~를 확인해보세요" 형태로 작성하세요.
       - 가능성 있는 원인들을 나열하고, 각각을 검증할 수 있는 방법을 제시하세요.
       - 작업자가 디버깅을 시작할 수 있는 진입점(파일, 함수, 라인)을 명확히 안내하세요.

       ## 분석 절차
       1. 이슈에서 버그 증상 파악
       2. 관련 코드 영역 탐색
       3. 의심되는 원인 후보 도출
       4. 각 후보별 검증 방법 제안

       ## 응답 형식
       ### 🔍 버그 조사 결과

       **증상 요약**: [이슈에서 파악한 증상]

       **조사 범위**:
       - [파일명](https://github.com/${{ github.repository }}/blob/${{ github.event.repository.default_branch }}/파일경로#L라인번호) - 관련성 설명

       **의심 원인**:
       1. [가능성 1] - 검증 방법: [어떻게 확인할 수 있는지]
       2. [가능성 2] - 검증 방법: [어떻게 확인할 수 있는지]

       **디버깅 시작점**:
       - [파일명](https://github.com/${{ github.repository }}/blob/${{ github.event.repository.default_branch }}/파일경로#L라인번호) - 확인 방법

       ---
       *🤖 이 분석은 AI가 자동 생성한 초기 조사 결과입니다.*
       *⚠️ 위 내용은 추측에 기반하므로, 실제 수정 전 직접 검증이 필요합니다.*

   - name: Post analysis comment
     if: steps.claude-analysis.outputs.result != ''
     uses: actions/github-script@v7
     env:
      ANALYSIS_RESULT: ${{ steps.claude-analysis.outputs.result }}
     with:
      script: |
       await github.rest.issues.createComment({
        owner: context.repo.owner,
        repo: context.repo.repo,
        issue_number: context.issue.number,
        body: process.env.ANALYSIS_RESULT,
       });
